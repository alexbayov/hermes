_config_lock: true

model:
  provider: "custom"
  base_url: "https://api.fireworks.ai/inference/v1"
  default: "accounts/fireworks/models/kimi-k2p6"

security:
  redact_secrets: true

terminal:
  backend: "local"
  timeout: 180
  lifetime_seconds: 300

memory:
  memory_enabled: true
  user_profile_enabled: true
  memory_char_limit: 2200
  user_char_limit: 1375
  nudge_interval: 10
  flush_min_turns: 6

session_reset:
  mode: both
  idle_minutes: 1440
  at_hour: 4

agent:
  max_turns: 30
  verbose: false
  reasoning_effort: "low"

tool_loop_guardrails:
  warnings_enabled: true
  hard_stop_enabled: true
  warn_after:
    exact_failure: 2
    same_tool_failure: 3
    idempotent_no_progress: 2
  hard_stop_after:
    exact_failure: 5
    same_tool_failure: 8
    idempotent_no_progress: 5

orchestrator:
  enabled: true
  concurrency: 1
  task_timeout_minutes: 30
  max_attempts: 3
  kill_switch_path: .hermes/stop
  fast_path_word_threshold: 200
  default_mode: full_cycle
  observability:
    status_file: runtime/plan.json
    log_dir: logs/
