notes: |
  Hermes already ships with ToolCallGuardrailController in agent/tool_guardrails.py.
  It detects three loop patterns:
  - exact_failure: same tool+args fails repeatedly
  - same_tool_failure: same tool fails with varying args
  - idempotent_no_progress: read/search returns identical results
  Thresholds used:
    warn_after: exact=2, same_tool=3, no_progress=2
    hard_stop_after: exact=5, same_tool=8, no_progress=5
  No code changes to upstream core required — pure config activation.
